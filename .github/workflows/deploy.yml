name: Deploy to Hetzner FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTPS with curl
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd ./public
          find . -type f | while read file; do
            dir=$(dirname "$file")
            mkdir -p "/tmp/upload/$dir"
            cp "$file" "/tmp/upload/$file"
          done
          cd /tmp/upload
          find . -type f | while read file; do
            curl -k --ftp-ssl-reqd -u "$FTP_USERNAME:$FTP_PASSWORD" \
              -T "$file" "ftp://$FTP_SERVER:21/public_html/$file"
          done
