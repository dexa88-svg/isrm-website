name: Deploy to Hetzner FTP

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Generate stats
        run: node scripts/generate-stats.js

      - name: Verify stats file
        run: ls -la public/data/stats.json

      - name: Deploy via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd ./public
          find . -type f | sed 's/^\.\///' | while read file; do
            curl -k --create-dirs -u "$FTP_USERNAME:$FTP_PASSWORD" \
              -T "$file" "sftp://$FTP_SERVER:22/$file"
          done

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for deployment to propagate
        # Allow time for the FTP upload to become visible over HTTP
        run: sleep 15

      - name: Check key pages are up (HTTP 200)
        run: |
          PAGES=(
            "https://ismr.online"
            "https://ismr.online/repair-guides/gy6-oil-change-guide.html"
            "https://ismr.online/diagnostics/gy6-no-start-troubleshooting.html"
          )
          FAILED=0
          for URL in "${PAGES[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 "$URL")
            echo "$URL → $STATUS"
            [ "$STATUS" -eq 200 ] || { echo "ERROR: $URL returned $STATUS"; FAILED=1; }
          done
          exit $FAILED
