name: Deploy to Hetzner FTP

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Generate stats
        run: node scripts/generate-stats.js

      - name: Verify stats file
        run: ls -la public/data/stats.json

      - name: Deploy via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd ./public
          find . -type f | sed 's/^\.\///' | while read file; do
            curl -k --create-dirs -u "$FTP_USERNAME:$FTP_PASSWORD" \
              -T "$file" "sftp://$FTP_SERVER:22/$file"
          done

      - name: Ping IndexNow (changed pages only)
        run: |
          # Build list of URLs for HTML files changed in this push
          CHANGED_URLS=$(git diff --name-only HEAD~1 HEAD -- 'public/**/*.html' \
            | grep -v '_removed' \
            | sed 's|^public/|https://ismr.online/|' \
            | sed 's|/index\.html$|/|' \
            | jq -R . | jq -s .)

          COUNT=$(echo "$CHANGED_URLS" | jq length)

          if [ "$COUNT" -eq 0 ]; then
            echo "No HTML pages changed — skipping IndexNow ping."
            exit 0
          fi

          echo "Pinging IndexNow for $COUNT changed URL(s): $CHANGED_URLS"

          HTTP_STATUS=$(curl -s -o /tmp/indexnow_response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"ismr.online\",
              \"key\": \"767a47df1cd247ea9a300510d2c3af76\",
              \"keyLocation\": \"https://ismr.online/767a47df1cd247ea9a300510d2c3af76.txt\",
              \"urlList\": $CHANGED_URLS
            }")

          echo "IndexNow response (HTTP $HTTP_STATUS):"
          cat /tmp/indexnow_response.txt

          # 200 = accepted, 202 = queued — both are success
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 202 ]; then
            echo "Warning: unexpected IndexNow response $HTTP_STATUS"
          fi
