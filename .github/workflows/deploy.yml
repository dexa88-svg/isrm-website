name: Deploy to Hetzner FTP

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Generate stats
        run: node scripts/generate-stats.js

      - name: Verify stats file
        run: ls -la public/data/stats.json

      - name: Deploy via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cd ./public
          find . -type f | sed 's/^\.\///' | while read file; do
            curl -k --create-dirs -u "$FTP_USERNAME:$FTP_PASSWORD" \
              -T "$file" "sftp://$FTP_SERVER:22/$file"
          done
