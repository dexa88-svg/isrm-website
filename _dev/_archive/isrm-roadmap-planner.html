<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISRM Roadmap Planner</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --success: #10b981;
            --bg: #f9fafb;
            --border: #e5e7eb;
            --text: #1f2937;
            --text-light: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .vision {
            font-size: 14px;
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
        }

        .progress-bar {
            margin: 20px 0 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-info h3 {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 600;
        }

        .progress-count {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .progress-fill {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            transition: width 0.3s ease;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .section-title h2 {
            font-size: 18px;
            color: var(--primary);
            flex: 1;
        }

        .section-count {
            font-size: 12px;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .checklist {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checklist-item:hover {
            background: #f3f4f6;
        }

        .checklist-item.completed {
            background: #ecfdf5;
        }

        .checklist-item.completed .checklist-label {
            color: var(--success);
            text-decoration: line-through;
        }

        .checkbox {
            min-width: 20px;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 12px;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .checklist-item.completed .checkbox {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .checkbox::after {
            content: '✓';
            opacity: 0;
            font-weight: bold;
            font-size: 12px;
        }

        .checklist-item.completed .checkbox::after {
            opacity: 1;
        }

        .checklist-label {
            flex: 1;
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s;
            word-break: break-word;
        }

        .subsection {
            margin-top: 15px;
            padding-left: 32px;
            font-size: 13px;
            color: var(--text-light);
        }

        .subsection-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .footer {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .header-controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛴 ISRM Roadmap Planner</h1>
            <p class="vision">A free, wiki-driven, 3D-interactive repair guide for scooters that auto-updates and grows itself</p>
            <div class="header-controls">
                <button class="btn-primary" onclick="markAllComplete()">✓ Mark All Done</button>
                <button class="btn-secondary" onclick="resetAll()">↻ Reset All</button>
                <button class="btn-secondary" onclick="exportProgress()">⬇ Export Progress</button>
            </div>
        </header>

        <div class="progress-bar">
            <div class="progress-info">
                <h3>Overall Progress</h3>
                <span class="progress-count"><span id="completed-count">0</span>/<span id="total-count">0</span></span>
            </div>
            <div class="progress-fill">
                <div class="progress-fill-inner" id="progress-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="stats" id="stats-container"></div>

        <div id="roadmap-container"></div>

        <div class="footer">
            <p>✨ Click any item to mark it complete. Your progress is saved automatically.</p>
            <p style="margin-top: 10px; font-size: 12px;">Last updated: <span id="last-updated"></span></p>
        </div>
    </div>

    <script>
        const roadmapData = {
            phases: [
                {
                    id: 'phase0',
                    title: 'Phase 0 — Lock vision, scope & naming',
                    outcome: 'A one-page brief and a registered domain.',
                    items: [
                        'Pin the one-liner, target user (DIY owner, not pro mechanic), and three "jobs to be done"',
                        'Decide the brand name (candidates: ScootWiki, FixMyScoot, ScooterDoc, RideManual, OpenMoto)',
                        'Buy a domain (~$10/yr for .com or free subdomain to start)',
                        'Define MVP boundary: browse, search, procedures, embed videos, seed content (no auth, AI, 3D yet)'
                    ]
                },
                {
                    id: 'phase1',
                    title: 'Phase 1 — Pick free stack & set up infra',
                    outcome: 'A deployed "hello world" at your domain, repo on GitHub, automatic deploys.',
                    items: [
                        'Choose framework: Astro (recommended) or Next.js',
                        'Deploy to Cloudflare Pages or Vercel free tier',
                        'Set up Supabase or Neon for DB (when needed)',
                        'Configure image hosting: Cloudflare R2 or Cloudinary',
                        'Integrate Pagefind for search',
                        'Add Cloudflare Web Analytics',
                        'Set up GitHub Actions for CI/CD',
                        'Add Sentry for error tracking'
                    ]
                },
                {
                    id: 'phase2',
                    title: 'Phase 2 — Design vehicle-agnostic data model',
                    outcome: 'A schema doc + 3 seed entries committed.',
                    items: [
                        'Design entities: Vehicle, Subsystem, Part, Procedure, Symptom→DiagnosticPath, Source, Edit',
                        'Decide storage: Markdown files in Git (recommended) or Database',
                        'Create repo structure with frontmatter templates',
                        'Seed 3 scooter models with basic data'
                    ]
                },
                {
                    id: 'phase3',
                    title: 'Phase 3 — Build MVP browse + search',
                    outcome: '5–10 hand-seeded scooter models live; searchable and mobile-ready.',
                    items: [
                        'Build vehicle index page with filters (type, make, electric/ICE)',
                        'Create vehicle detail pages with specs and subsystem list',
                        'Design and build procedure pages with steps, images, videos, safety callouts',
                        'Integrate Pagefind full-text search',
                        'Add sitemap, robots.txt, Open Graph tags',
                        'Implement JSON-LD HowTo schema for SEO',
                        'Ensure mobile-first responsive design',
                        'Test on phone at full Lighthouse 90+',
                        'Seed 5–10 target models (e.g., Xiaomi M365, Ninebot Max G30, Vespa Primavera 150)'
                    ]
                },
                {
                    id: 'phase4',
                    title: 'Phase 4 — Wiki-style contributions',
                    outcome: 'Anyone with a GitHub account can propose edits via a dashboard.',
                    items: [
                        'Install Decap CMS or Sveltia CMS (GitHub-PR-as-CMS)',
                        'Create wiki editor UI on the site',
                        'Add contributor profile pages',
                        'Show edit history per article',
                        'Add "stub" tag for incomplete pages',
                        'Create light rewards system (badges for first 5 edits)',
                        'Seed 5 more scooter models'
                    ]
                },
                {
                    id: 'phase5',
                    title: 'Phase 5 — Automated content ingestion',
                    outcome: 'A scheduled pipeline that produces draft pages weekly.',
                    items: [
                        'Set up GitHub Actions or Cloudflare Workers cron',
                        'Add YouTube Data API integration (search "[model] repair / teardown")',
                        'Add manufacturer service manual parsing (pdfplumber or Claude vision)',
                        'Integrate Reddit API + RSS (r/ElectricScooters, r/scooters)',
                        'Scrape forums (ES Forum, ModernVespa) with proper rate limits and ToS check',
                        'Parse manufacturer parts catalogs (OEM numbers)',
                        'Build LLM normalizer (Claude API) to map raw content → MDX schema',
                        'Create human review gate: bot-draft PRs for approval',
                        'Track per-source success metrics'
                    ]
                },
                {
                    id: 'phase6',
                    title: 'Phase 6 — Interactive 3D / exploded views',
                    outcome: 'At least one hero scooter with clickable 3D model linked to wiki.',
                    items: [
                        'Choose 3D tech: Google model-viewer web component (cheapest) or Three.js',
                        'Source assets: GrabCAD, Sketchfab CC models, Blender community, or AI-generated',
                        'Create hotspot JSON mapping 3D coords to part IDs',
                        'Build clicking interaction to open part pages',
                        'Build workflow template for next 5 models'
                    ]
                },
                {
                    id: 'phase7',
                    title: 'Phase 7 — AI repair assistant (chat)',
                    outcome: 'A "Got a problem?" chat that walks users to procedures.',
                    items: [
                        'Build RAG over MDX corpus + ingested sources',
                        'Embed corpus at build time (free, local)',
                        'Set up Claude API for inference with budget alerts',
                        'Show source citations for every answer',
                        'Track unanswered questions → content backlog',
                        'Test accuracy and relevance'
                    ]
                },
                {
                    id: 'phase8',
                    title: 'Phase 8 — Mobile (PWA → native)',
                    outcome: 'Installable from phone, works offline for saved procedures.',
                    items: [
                        'Build PWA with service worker',
                        'Add offline caching for procedures',
                        'Create "Save for offline" button',
                        'Add camera intent for VIN/serial photo search',
                        'Defer React Native/Expo until demand justifies it'
                    ]
                },
                {
                    id: 'cross-cutting',
                    title: 'Cross-cutting — Legal & Compliance',
                    outcome: 'Legal foundation and content rights in place.',
                    items: [
                        'Write Terms of Service',
                        'Write Privacy Policy',
                        'Add DMCA takedown process',
                        'Set contributor license: CC-BY-SA 4.0',
                        'Add repair disclaimer on every procedure',
                        'Ensure proper trademark usage (nominative only)',
                        'Document scraping ToS checks and rate limits'
                    ]
                },
                {
                    id: 'growth',
                    title: 'Cross-cutting — Self-growing flywheel',
                    outcome: 'Content and community growth mechanisms in place.',
                    items: [
                        'Implement programmatic SEO for (model × repair) combos',
                        'Add "Saw something wrong? Edit this page" CTAs',
                        'Create symptom→content loop from AI chats',
                        'Build contributor leaderboards and badges',
                        'Create embeddable widgets for backlinks',
                        'Set up weekly newsletter (Buttondown free tier)'
                    ]
                },
                {
                    id: 'monetization',
                    title: 'Cross-cutting — Monetization (later)',
                    outcome: 'Revenue strategy planned for later phases.',
                    items: [
                        'Add affiliate links (Amazon Associates, eBay Partner, AliExpress)',
                        'Create donation page (GitHub Sponsors, Buy Me a Coffee)',
                        'Plan sponsored shop listings (after traffic)',
                        'Never paywall procedures'
                    ]
                },
                {
                    id: 'decisions',
                    title: 'Open Decisions',
                    outcome: 'Key decisions documented.',
                    items: [
                        'Brand name & domain choice',
                        'Astro vs Next.js',
                        'Markdown-in-Git vs DB for content',
                        'GitHub-PR-as-CMS vs custom edits',
                        'License: CC-BY-SA confirmed?',
                        'First seed model for full build-out'
                    ]
                }
            ]
        };

        // Initialize planner
        function init() {
            loadProgress();
            renderRoadmap();
            updateStats();
            updateLastUpdated();
        }

        function renderRoadmap() {
            const container = document.getElementById('roadmap-container');
            container.innerHTML = '';

            roadmapData.phases.forEach(phase => {
                const section = document.createElement('div');
                section.className = 'section';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'section-title';
                titleDiv.innerHTML = `
                    <h2>${phase.title}</h2>
                    <span class="section-count">${getPhaseProgress(phase.id).completed}/${phase.items.length}</span>
                `;

                const outcomeDiv = document.createElement('div');
                outcomeDiv.style.marginBottom = '12px';
                outcomeDiv.style.padding = '10px 12px';
                outcomeDiv.style.background = '#f0f9ff';
                outcomeDiv.style.borderLeft = '3px solid var(--primary)';
                outcomeDiv.style.fontSize = '13px';
                outcomeDiv.style.color = 'var(--text-light)';
                outcomeDiv.textContent = `📌 Outcome: ${phase.outcome}`;

                const checklist = document.createElement('div');
                checklist.className = 'checklist';

                phase.items.forEach((item, idx) => {
                    const itemEl = document.createElement('div');
                    const key = `${phase.id}-${idx}`;
                    const isCompleted = getProgress()[key];

                    itemEl.className = `checklist-item ${isCompleted ? 'completed' : ''}`;
                    itemEl.innerHTML = `
                        <div class="checkbox"></div>
                        <div class="checklist-label">${item}</div>
                    `;

                    itemEl.addEventListener('click', () => toggleItem(key, itemEl));
                    checklist.appendChild(itemEl);
                });

                section.appendChild(titleDiv);
                section.appendChild(outcomeDiv);
                section.appendChild(checklist);
                container.appendChild(section);
            });
        }

        function toggleItem(key, element) {
            const progress = getProgress();
            progress[key] = !progress[key];
            saveProgress(progress);

            if (progress[key]) {
                element.classList.add('completed');
            } else {
                element.classList.remove('completed');
            }

            updateStats();
        }

        function getProgress() {
            const stored = localStorage.getItem('isrm-progress');
            return stored ? JSON.parse(stored) : {};
        }

        function saveProgress(progress) {
            localStorage.setItem('isrm-progress', JSON.stringify(progress));
        }

        function loadProgress() {
            // Just load from localStorage on init
            getProgress();
        }

        function getPhaseProgress(phaseId) {
            const progress = getProgress();
            const phase = roadmapData.phases.find(p => p.id === phaseId);
            if (!phase) return { completed: 0, total: 0 };

            let completed = 0;
            phase.items.forEach((_, idx) => {
                const key = `${phaseId}-${idx}`;
                if (progress[key]) completed++;
            });

            return { completed, total: phase.items.length };
        }

        function updateStats() {
            const progress = getProgress();
            let totalCompleted = 0;
            let totalItems = 0;

            roadmapData.phases.forEach(phase => {
                const phaseProgress = getPhaseProgress(phase.id);
                totalCompleted += phaseProgress.completed;
                totalItems += phaseProgress.total;
            });

            document.getElementById('completed-count').textContent = totalCompleted;
            document.getElementById('total-count').textContent = totalItems;

            const percentage = totalItems > 0 ? (totalCompleted / totalItems) * 100 : 0;
            document.getElementById('progress-inner').style.width = percentage + '%';

            // Update stats grid
            const statsContainer = document.getElementById('stats-container');
            const stats = [];
            roadmapData.phases.slice(0, 8).forEach(phase => {
                const { completed, total } = getPhaseProgress(phase.id);
                stats.push({ name: phase.id.replace('phase', 'Phase '), completed, total });
            });

            statsContainer.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-number">${stat.completed}/${stat.total}</div>
                    <div class="stat-label">${stat.name}</div>
                </div>
            `).join('');
        }

        function markAllComplete() {
            const progress = getProgress();
            roadmapData.phases.forEach(phase => {
                phase.items.forEach((_, idx) => {
                    progress[`${phase.id}-${idx}`] = true;
                });
            });
            saveProgress(progress);
            renderRoadmap();
            updateStats();
        }

        function resetAll() {
            if (confirm('Reset all checkmarks? This cannot be undone.')) {
                localStorage.removeItem('isrm-progress');
                renderRoadmap();
                updateStats();
            }
        }

        function exportProgress() {
            const progress = getProgress();
            let text = 'ISRM Roadmap Progress\n';
            text += '=' .repeat(50) + '\n\n';

            roadmapData.phases.forEach(phase => {
                const { completed, total } = getPhaseProgress(phase.id);
                text += `${phase.title}\n`;
                text += `Progress: ${completed}/${total}\n`;
                text += '-'.repeat(50) + '\n';

                phase.items.forEach((item, idx) => {
                    const key = `${phase.id}-${idx}`;
                    const isDone = progress[key];
                    text += `${isDone ? '✓' : '○'} ${item}\n`;
                });
                text += '\n';
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ISRM-Progress-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Auto-save on any change
        window.addEventListener('storage', () => {
            renderRoadmap();
            updateStats();
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
